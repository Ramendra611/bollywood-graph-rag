version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Bollywood GraphRAG — Docker Compose
#
# WHY docker compose INSTEAD OF docker run?
# ──────────────────────────────────────────
# docker run works, but you'd have to type this every time:
#
#   docker run -d --name bollywood_neo4j \
#     -p 7474:7474 -p 7687:7687 \
#     -e NEO4J_AUTH=neo4j/bollywood2024! \
#     -e NEO4J_PLUGINS='["apoc"]' \
#     -v $(pwd)/neo4j_data/data:/data \
#     -v $(pwd)/neo4j_data/logs:/logs \
#     neo4j:5.18.0
#
# docker compose stores all of that in a versioned file that lives in the
# project, can be committed to Git, and is reproduced with one command.
# For multi-service setups (Neo4j + API + Streamlit), it also manages the
# network between containers automatically.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Neo4j Graph Database ───────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18.0
    container_name: bollywood_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (human-facing UI)
      - "7687:7687"   # Bolt protocol (Python driver connection)
    environment:
      - NEO4J_AUTH=neo4j/bollywood2024!
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
      - ./neo4j_data/plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: bollywood_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=bollywood2024!
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  # ── Streamlit Frontend ─────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: bollywood_chat
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./src:/app/src
